services:
  postgres:
    image: postgres:16-alpine
    container_name: recon-bot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: recon
      POSTGRES_PASSWORD: recon1234
      POSTGRES_DB: recon_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: